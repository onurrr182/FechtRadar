name: Automated Tournament Scraper

# Schedule the scraper to run automatically
on:
  schedule:
    # Runs at 02:00 AM (UTC) every Sunday
    # You can change this to daily by using '0 2 * * *'
    - cron: '0 2 * * *'
  
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

# Ensure the action has permission to commit back to the repository
permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up consecutive runs by caching requirements

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        # Execute the fast multithreaded scraper
        run: python fast_scraper.py
        
      - name: Commit and Push Changes
        run: |
          # Configure Git user for the automated commit
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add updated files
          git add tournaments.json geocache.json
          
          # Commit cleanly (this will intentionally fail cleanly if no changes)
          git commit -m "Automated update: FechtRadar data & geocache" || echo "No changes to commit"
          
          # Push back to the main branch
          git push
